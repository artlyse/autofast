<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de cliente - AutoFast</title>
</head>
<body>
    <div th:fragment="content">
        <div class="page-header">
            <h1 th:text="${cliente.id == null ? 'Nuevo cliente' : 'Editar cliente'}">Nuevo cliente</h1>
        </div>

        <div class="form-container">
            <form th:action="@{${cliente.id == null ? '/clientes/guardar' : '/clientes/actualizar/' + cliente.id}}" 
                  th:object="${cliente}" method="post">
                
                <div class="form-section">
                    <h3>Datos personales</h3>
                    
                    <div class="form-group">
                        <label for="dniRuc">DNI / RUC *</label>
                        <input type="text" th:field="*{dniRuc}" id="dniRuc" class="form-control" required placeholder="12345678">
                    </div>

                    <div class="form-group">
                        <label for="nombre">Nombre *</label>
                        <input type="text" th:field="*{nombre}" id="nombre" class="form-control" required placeholder="Nombre">
                    </div>

                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" th:field="*{apellido}" id="apellido" class="form-control" placeholder="Apellido">
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="text" th:field="*{telefono}" id="telefono" class="form-control" placeholder="987654321">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" th:field="*{email}" id="email" class="form-control" placeholder="correo@email.com">
                    </div>

                    <div class="form-group">
                        <label for="direccion">Dirección</label>
                        <input type="text" th:field="*{direccion}" id="direccion" class="form-control" placeholder="Av. Ejemplo 123">
                    </div>
                </div>

                <div class="form-actions">
                    <span class="form-hint">Los campos obligatorios están identificados con *.</span>
                    <div class="button-group">
                        <a th:href="@{/clientes}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
