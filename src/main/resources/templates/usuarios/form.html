<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de usuario - AutoFast</title>
</head>
<body>
    <div th:fragment="content">
        <div class="page-header">
            <h1 th:text="${usuario.id == null ? 'Nuevo usuario' : 'Editar usuario'}">Nuevo usuario</h1>
        </div>

        <div class="form-container">
            <form th:action="@{${usuario.id == null ? '/usuarios/guardar' : '/usuarios/actualizar/' + usuario.id}}" 
                  th:object="${usuario}" method="post">
                
                <div class="form-section">
                    <h3>Datos del usuario</h3>

                    <div class="form-group">
                        <label for="username">Usuario *</label>
                        <input type="text" th:field="*{username}" id="username" class="form-control" required placeholder="usuario">
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña <span th:if="${usuario.id != null}">(dejar en blanco para mantener)</span> *</label>
                        <input type="password" th:field="*{password}" id="password" class="form-control" th:required="${usuario.id == null}" placeholder="********">
                    </div>

                    <div class="form-group">
                        <label for="nombre">Nombre *</label>
                        <input type="text" th:field="*{nombre}" id="nombre" class="form-control" required placeholder="Nombre">
                    </div>

                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" th:field="*{apellido}" id="apellido" class="form-control" placeholder="Apellido">
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" th:field="*{email}" id="email" class="form-control" required placeholder="correo@email.com">
                    </div>

                    <div class="form-group">
                        <label for="rol">Rol *</label>
                        <select th:field="*{rol}" id="rol" class="form-control" required>
                            <option value="">Seleccione un rol</option>
                            <option value="ADMIN">ADMIN</option>
                            <option value="RECEPCIONISTA">RECEPCIONISTA</option>
                            <option value="TECNICO">TECNICO</option>
                            <option value="ALMACENERO">ALMACENERO</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" th:field="*{activo}" /> Activo
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <span class="form-hint">Los campos obligatorios están identificados con *.</span>
                    <div class="button-group">
                        <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
